name: Publish Forty Seconds PDF

on:
  push:
    branches: [main]
    paths:
      - stories/detective_noir/forty_seconds.md
      - stories/detective_noir/story-template.typ
      - .github/workflows/publish-pdf.yml

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install pandoc
        uses: pandoc/actions/setup@v1

      - name: Install typst
        uses: typst-community/setup-typst@v4

      - name: Install Liberation fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-liberation

      - name: Generate PDF
        working-directory: stories/detective_noir
        run: |
          pandoc \
            -f markdown-yaml_metadata_block \
            forty_seconds.md \
            -o forty_seconds.pdf \
            --pdf-engine=typst \
            --template=story-template.typ

      - name: Inline images as base64 data URIs
        working-directory: stories/detective_noir
        run: |
          python3 -c "
          import re, base64, pathlib
          md = pathlib.Path('forty_seconds.md').read_text()
          def inline(m):
              path = m.group(1)
              data = base64.b64encode(pathlib.Path(path).read_bytes()).decode()
              return '(' + 'data:image/jpeg;base64,' + data + ')'
          md = re.sub(r'\((../../images/[^)]+)\)', inline, md)
          pathlib.Path('forty_seconds.md').write_text(md)
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: forty-seconds-${{ github.run_number }}-${{ github.sha }}
          name: "Forty Seconds — Build #${{ github.run_number }}"
          files: |
            stories/detective_noir/forty_seconds.pdf
            stories/detective_noir/forty_seconds.md
